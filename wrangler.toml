name = "ldlawq"
pages_build_output_dir = "web"
compatibility_date = "2024-09-23"

# D1 数据库绑定（知识库 + 业务库合并为单库）
# 部署前先运行：wrangler d1 create ldlawq
# 将输出的 database_id 填入下方
[[d1_databases]]
binding = "DB"
database_name = "ldlawq"
database_id = "190103a0-ff8f-4def-81ae-c4c6aee3c936"

# 环境变量在 Cloudflare Pages 控制台 → 设置 → 环境变量 里配置：
#   DEEPSEEK_API_KEY   （必填，密钥；建议加密 Secret）
#   DEEPSEEK_MODEL     （可选，默认 deepseek-chat）
